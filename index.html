our augmenter le revenu<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Le pay-per-use seul plafonne vite. Cinq leviers permettent de faire grossir le revenu par foyer et par zone, sans dénaturer le positionnement premium.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2rem 0 2.4rem;\">\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">1 — Un forfait \"Sérénité\" optionnel<\u002Fh4><p style=\"{{ cardTextStyle }}\">Un abonnement mensuel (ex. 39–59 €) qui donne un tarif préférentiel sur les missions, un conseiller dédié et un appel de courtoisie régulier. Ça ajoute un revenu récurrent par foyer, en plus du paiement à l'acte , sans forcer l'engagement pour ceux qui n'en veulent pas.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">2 — Partenariats B2B<\u002Fh4><p style=\"{{ cardTextStyle }}\">Banques privées, family offices, mutuelles santé senior, résidences services proposent le service à leurs clients ou résidents en marque blanche. Cycle de vente plus long, mais volume garanti et paniers bien plus élevés qu'en B2C pur.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">3 — Commission différenciée<\u002Fh4><p style=\"{{ cardTextStyle }}\">Taux plus élevé sur les missions à forte valeur de confiance (compagnonnage, accompagnement médical), taux plus bas sur les tâches commodity (courses) pour rester compétitif là où la concurrence existe déjà.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">4 — Un rôle de référent de confiance<\u002Fh4><p style=\"{{ cardTextStyle }}\">Pour un senior sans famille proche, être désigné, moyennant un forfait, comme contact de confiance ou contact d'urgence officiel (auprès du voisinage, d'un notaire, d'un médecin) un service à forte valeur perçue, presque introuvable ailleurs pour ce profil isolé.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Le scénario d'ambition<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Le 7e arrondissement seul valide le modèle. La trajectoire prend sa vraie dimension une fois répliquée sur les zones à profil comparable, en s'appuyant sur l'empreinte du réseau Yes Conciergerie pour aller plus vite.<\u002Fp>\n\n      <sc-raw-table style=\"width:100%;border-collapse:collapse;margin:0 0 2rem;font-size:.92rem;\">\n        <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"{{ econThStyle }}\"><\u002Fsc-raw-th><sc-raw-th style=\"text-align: center\">ANNÉE 1<\u002Fsc-raw-th><sc-raw-th style=\"text-align: center\">&nbsp;ANNÉE 2<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n        <sc-raw-tbody>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Zones actives<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">1 (Paris 7e)<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">15 – 20 villes<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Profil des zones<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">Pilote unique<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">6e/16e Paris, Neuilly, villes à franchisé Yes Conciergerie<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Seniors actifs cumulés<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">135 – 180<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">2 000 – 3 000<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Revenu B2C mensuel<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">12 000 – 34 000 €<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">180 000 – 570 000 €<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTotalTdStyle }}\">+ Contrats B2B / franchise<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTotalNumStyle }}\">—<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTotalNumStyle }}\">Revenu additionnel non chiffré ici<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n        <\u002Fsc-raw-tbody>\n      <\u002Fsc-raw-table>\n\n      <div style=\"font-family: 'IBM Plex Mono',monospace; font-size: .7rem; letter-spacing: .14em; text-transform: uppercase; color: #7C8A72; margin-bottom: 1.3rem; text-align: center\">REVENU B2C MENSUEL UNIQUEMENT EN FIN D'ANNEE<\u002Fdiv><div style=\"background: #FEFCF6; border: 1px solid rgba(124,138,114,.22); border-radius: 14px; padding: 1.8rem 2rem; margin: 0 0 2rem; box-shadow: 0 8px 22px rgba(23,36,29,.06); width: 316px; height: 141px\">\n        \n        <div style=\"display:flex;align-items:flex-end;gap:2.4rem;height:150px;padding-left:.5rem;\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:.5rem;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.8rem;color:#17241D;\">12–34k €<\u002Fdiv>\n            <div style=\"width:56px;height:22px;background:#AD8032;border-radius:5px 5px 0 0;\"><\u002Fdiv>\n            <div style=\"font-size:.72rem;color:#7C8A72;\">Année 1<\u002Fdiv>\n          <\u002Fdiv><div style=\"display:flex;flex-direction:column;align-items:center;gap:.5rem;\">\n            \n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.8rem;color:#17241D;\">180–570k €<\u002Fdiv><div style=\"width:56px;height:130px;background:#17241D;border-radius:5px 5px 0 0;\"><\u002Fdiv>\n            <div style=\"font-size:.72rem;color:#7C8A72;\">Année 2<\u002Fdiv>\n          <\u002Fdiv>\n          \n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      \n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- 06 PROPOSITION -->\n    <sc-if value=\"{{ isP5 }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Proposition\" style=\"animation:fadein .4s ease;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#AD8032;margin-bottom:1rem;\">06 — Prochaines étapes<\u002Fdiv>\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:clamp(1.7rem,3.6vw,2.5rem);line-height:1.18;margin:0 0 1.2rem;color:#17241D;letter-spacing:-.01em;\">Deux niveaux d'engagement, selon le niveau d'implication souhaité.<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 2.2rem;\">Cette note préliminaire pose le cadre. Deux étapes distinctes permettent d'aller plus loin, chacune avec un périmètre et un coût propres.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin:2.2rem 0;\">\n        <div style=\"border:1px solid rgba(124,138,114,.28);border-radius:12px;padding:2rem 1.9rem;display:flex;flex-direction:column;background:#FEFCF6;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#AD8032;margin-bottom:.7rem;\">Étape 1<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.4rem;margin:0 0 .8rem;color:#17241D;\">Finaliser l'étude de faisabilité<\u002Fh4>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:1.3rem;margin:0 0 1.2rem;color:#AD8032;\"><span style=\"background-color: rgba(173, 128, 50, 0.14); text-align: center\">À chiffrer<\u002Fspan><\u002Fdiv>\n          <ul style=\"padding-left:1.2rem;margin:0;font-size:.92rem;flex-grow:1;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.55rem;\">Finaliser la cartographie des acteurs et affiner le positionnement tarifaire<\u002Fli>\n            <li style=\"margin-bottom:.55rem;\">Trancher le statut juridique SAP (mandataire vs prestataire), avec recommandation argumentée<\u002Fli>\n            <li style=\"margin-bottom:.55rem;\">Compléter et chiffrer précisément le business plan : volumes cibles, coût d'acquisition, seuil de rentabilité<\u002Fli>\n            <li>Qualifier les premiers partenaires potentiels sur la zone de lancement pressentie (Paris 6e/7e)<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #AD8032;border-radius:12px;padding:2rem 1.9rem;display:flex;flex-direction:column;background:linear-gradient(160deg,#17241D,#1F2E24);color:#FAF7EF;box-shadow:0 20px 40px rgba(23,36,29,.25);\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#D4AC6E;margin-bottom:.7rem;\">Étape 2<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.4rem;margin:0 0 .8rem;color:#FAF7EF;\">Lancer une phase de test à Paris (6e/7e)<\u002Fh4>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:1.3rem;margin:0 0 1.2rem;color:#D4AC6E;\"><span style=\"background:rgba(212,172,110,.16);padding:.1rem .5rem;border-radius:4px;\">A chiffrer<\u002Fspan><\u002Fdiv>\n          <ul style=\"padding-left:1.2rem;margin:0;font-size:.92rem;flex-grow:1;color:rgba(250,247,239,.82);line-height:1.7;\">\n            <li style=\"margin-bottom:.55rem;\">Structuration juridique et contractuelle minimale pour opérer (statut SAP, CGV, contrats partenaires)<\u002Fli><li style=\"font-size: 14.72px\">Mise en place du numéro unique et du centre d'appel pour qualifier les demandes<\u002Fli>\n            \n            <li style=\"margin-bottom:.55rem;\">Mise en place du flux de paiement à l'acte (Stripe Connect)<\u002Fli><li style=\"margin-bottom:.55rem;\">Recrutement et contractualisation d'un premier réseau de prestataires sur la zone test<\u002Fli>\n            <li>Pilotage de la phase test sur le terrain : volumes, satisfaction, coûts réels, avant décision d'extension<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px dashed #AD8032;margin-top:2.6rem;padding-top:1.8rem;display:flex;gap:1.3rem;align-items:flex-start;flex-wrap:wrap;\">\n        <div style=\"font-family:'Petrona',serif;font-weight:600;font-size:2.2rem;color:#AD8032;\">%<\u002Fdiv>\n        <p style=\"margin:0;max-width:52ch;color:#4A5A4E;font-size:.96rem;line-height:1.65;\">En tant que conseil, une commission sur le montant de chacune de ces deux prestations s'applique — <span style=\"background: rgba(173, 128, 50, 0.14); color: rgb(173, 128, 50); padding: 0.1rem 0.5rem; border-radius: 4px; font-family: &quot;IBM Plex Mono&quot;, monospace; font-size: 0.92em;\">à définir ensemble<\u002Fspan>&nbsp;— couvrant le pilotage et la coordination des expertises mobilisées (juridique, technique, réseau de partenaires).<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <footer style=\"padding:2.8rem 0 1rem;font-size:.78rem;color:#7C8A72;line-height:1.75;border-top:1px solid rgba(124,138,114,.28);margin-top:1.5rem;\">\n      Sources : INSEE (démographie 2024, projections 2021–2031, portraits d'arrondissements) · Apur · Xerfi (marché silver économie) · BPI France · OpinionWay · sites publics des acteurs cités (Les Majordomes, YesHome, Famille-Seniors-En-Ligne, Europ Assistance, Smart Good Alliance, Neosilver, Papyhappy). Document de travail — chiffres illustratifs à affiner en étude complète. Usage interne, ne pas diffuser à des tiers sans accord.\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = { active: 'p1' };\n\n  cardStyle = \"border:1px solid rgba(124,138,114,.22);border-radius:12px;padding:1.5rem 1.6rem;background:#FEFCF6;box-shadow:0 6px 18px rgba(23,36,29,.06);\";\n  cardTitleStyle = \"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .6rem;color:#17241D;\";\n  cardTextStyle = \"font-size:.92rem;color:#4A5A4E;margin:0;line-height:1.6;\";\n  legalCardStyle = \"border:1px solid rgba(124,138,114,.22);border-radius:12px;padding:1.6rem 1.7rem;background:#FEFCF6;box-shadow:0 6px 18px rgba(23,36,29,.06);\";\n  mpSideStyle = \"border:1px solid rgba(124,138,114,.22);border-radius:12px;padding:1.6rem 1.7rem;background:#FEFCF6;box-shadow:0 6px 18px rgba(23,36,29,.06);\";\n  accentColors = ['#AD8032', '#7C5CAD', '#3E7C5A', '#B5502E'];\n  statRing = (pct, color) => {\n    const r = 42, c = 2 * Math.PI * r, off = c - (c * pct / 100);\n    return { r, c, off, color };\n  };\n  missionCardStyle = \"background:#fff;border:1px solid rgba(124,138,114,.25);border-radius:8px;padding:.85rem .9rem;margin-bottom:.75rem;\";\n  missionBtnStyle = \"display:block;width:100%;text-align:center;background:#17241D;color:#FAF7EF;font-family:'IBM Plex Mono',monospace;font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;padding:.55rem;border-radius:5px;box-sizing:border-box;\";\n  missionBtnGhostStyle = \"display:block;width:100%;text-align:center;background:none;border:1px solid rgba(124,138,114,.3);color:#7C8A72;font-family:'IBM Plex Mono',monospace;font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;padding:.55rem;border-radius:5px;box-sizing:border-box;\";\n  tagStyle = \"display:inline-block;font-size:.68rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.03em;padding:.15rem .55rem;border:1px solid #AD8032;color:#AD8032;border-radius:20px;white-space:nowrap;\";\n  detailRowStyle = \"display:flex;justify-content:space-between;font-size:.76rem;padding:.55rem 0;border-bottom:1px solid rgba(124,138,114,.25);color:#4A5A4E;\";\n  thStyle = \"text-align:left;font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:#7C8A72;padding:.85rem 1rem;border-bottom:1px solid rgba(124,138,114,.28);background:#F3ECDC;\";\n  tdStyle = \"padding:.9rem 1rem;border-bottom:1px solid rgba(124,138,114,.22);vertical-align:top;color:#4A5A4E;\";\n  tdNameStyle = \"padding:.9rem 1rem;border-bottom:1px solid rgba(124,138,114,.22);vertical-align:top;color:#17241D;font-weight:600;\";\n  econThStyle = \"text-align:left;font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#7C8A72;padding:.7rem .9rem;border-bottom:1px solid rgba(124,138,114,.28);\";\n  econTdStyle = \"padding:.8rem .9rem;border-bottom:1px solid rgba(124,138,114,.22);color:#4A5A4E;\";\n  econNumStyle = \"padding:.8rem .9rem;border-bottom:1px solid rgba(124,138,114,.22);font-family:'IBM Plex Mono',monospace;color:#17241D;text-align:right;\";\n  econTotalTdStyle = \"padding:.9rem .9rem;font-weight:600;color:#17241D;border-top:1.5px solid #17241D;\";\n  econTotalNumStyle = \"padding:.9rem .9rem;font-weight:600;color:#17241D;border-top:1.5px solid #17241D;font-family:'IBM Plex Mono',monospace;text-align:right;\";\n\n  flowLabels = ['Appel entrant', 'Sélection partenaire', 'Réservation', 'Intervention', 'Paiement', 'Suivi qualité'];\n  flowColors = ['#AD8032', '#7C5CAD', '#3E7C5A', '#B5502E', '#AD8032', '#3E7C5A'];\n\n  tabDefs = [\n    { key: 'p1', num: '01', label: 'Opportunité' },\n    { key: 'p0', num: '02', label: 'Notre offre' },\n    { key: 'p2', num: '03', label: 'Benchmark' },\n    { key: 'p3', num: '04', label: 'Faisabilité & stack' },\n    { key: 'p4', num: '05', label: 'Modèle économique' },\n    { key: 'p5', num: '06', label: 'Proposition' },\n  ];\n\n  renderVals() {\n    const active = this.state.active;\n    const tabs = this.tabDefs.map(t => {\n      const isActive = t.key === active;\n      return {\n        num: t.num,\n        label: t.label,\n        onClick: () => this.setState({ active: t.key }),\n        style: {\n          appearance: 'none', border: 'none', cursor: 'pointer', textAlign: 'left',\n          fontFamily: \"'IBM Plex Mono',monospace\", fontSize: '.78rem', letterSpacing: '.05em',\n          padding: '.75rem .7rem', borderLeft: isActive ? '2px solid #AD8032' : '2px solid transparent',\n          borderRadius: '0 6px 6px 0', transition: 'color .2s ease, background .2s ease, border-color .2s ease',\n          color: isActive ? '#FAF7EF' : 'rgba(250,247,239,.6)',\n          background: isActive ? 'rgba(250,247,239,.07)' : 'none',\n        },\n        numStyle: { color: '#D4AC6E', marginRight: '.65em', fontWeight: 500 },\n      };\n    });\n\n    const flowSteps = this.flowLabels.map((label, i) => ({\n      num: String(i + 1).padStart(2, '0'),\n      label,\n      bg: this.flowColors[i],\n      fg: '#FAF7EF',\n      showArrow: i > 0,\n    }));\n\n    return {\n      tabs,\n      flowSteps,\n      isP1: active === 'p1', isP0: active === 'p0', isP2: active === 'p2',\n      isP3: active === 'p3', isP4: active === 'p4', isP5: active === 'p5',\n      cardStyle: this.cardStyle, cardTitleStyle: this.cardTitleStyle, cardTextStyle: this.cardTextStyle,\n      legalCardStyle: this.legalCardStyle, mpSideStyle: this.mpSideStyle,\n      missionCardStyle: this.missionCardStyle, missionBtnStyle: this.missionBtnStyle, missionBtnGhostStyle: this.missionBtnGhostStyle,\n      tagStyle: this.tagStyle, detailRowStyle: this.detailRowStyle,\n      thStyle: this.thStyle, tdStyle: this.tdStyle, tdNameStyle: this.tdNameStyle,\n      econThStyle: this.econThStyle, econTdStyle: this.econTdStyle, econNumStyle: this.econNumStyle,\n      econTotalTdStyle: this.econTotalTdStyle, econTotalNumStyle: this.econTotalNumStyle,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
