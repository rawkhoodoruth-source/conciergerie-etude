  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-display: swap;\n  src: url(\"5bb36e76-f103-4b50-a864-ad0005f1cdd0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    body{margin:0;background:#FBF7EE;-webkit-font-smoothing:antialiased;}\n    ::selection{background:#D4AC6E;color:#17241D;}\n    @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}\n    a{color:#AD8032;text-decoration:none;}\n    a:hover{color:#8C6526;text-decoration:underline;}p{text-align:justify !important;}@media (max-width:1024px){div[style*='min-height: 100vh']{flex-direction:column !important}aside{position:static !important;width:100% !important;height:auto !important;padding:1.6rem 1.5rem !important;box-sizing:border-box !important}main{max-width:100% !important;padding:3rem 2rem 4rem !important;box-sizing:border-box !important}div[style*='grid-template-columns: repeat(3, 1fr)']{grid-template-columns:repeat(2,1fr) !important}}@media (max-width:600px){aside{padding:1.3rem 1rem !important;box-sizing:border-box !important}main{padding:2rem 1.1rem 2.5rem !important;box-sizing:border-box !important}div[style*='grid-template-columns: 1fr 1fr']{grid-template-columns:1fr !important}div[style*='grid-template-columns: repeat(3, 1fr)']{grid-template-columns:1fr !important}img[alt='Yes Conciergerie']{max-width:90px !important}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;min-height:100vh;font-family:'IBM Plex Sans',sans-serif;color:#211D17;background:#FBF7EE;\">\n\n  <aside style=\"width:300px;flex-shrink:0;background:linear-gradient(165deg,#17241D 0%,#1D2C22 55%,#17241D 100%);color:#FAF7EF;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:2rem 1.6rem 1.6rem;overflow-y:auto;box-shadow:6px 0 30px rgba(0,0,0,.18);\">\n\n    <div style=\"background:#fff;border-radius:10px;padding:1.1rem 1.2rem .9rem;display:flex;flex-direction:column;align-items:flex-start;gap:.5rem;margin-bottom:2rem;box-shadow:0 10px 24px rgba(0,0,0,.22);\">\n      <img src=\"0317c9f7-16dc-483c-825a-b1f8e1da136f\" alt=\"Yes Conciergerie\" style=\"width:100%;max-width:110px;display:block;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#AD8032;\"><br><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 style=\"font-family: 'Petrona',serif; font-weight: 400; font-size: 1.45rem; line-height: 1.25; margin: 0 0 .6rem; letter-spacing: .01em; text-align: center\">Conciergerie privée <em style=\"font-style:normal;font-weight:600;color:#D4AC6E;\">pour seniors<\u002Fem><\u002Fh1>\n    <p style=\"font-size:.84rem;color:rgba(250,247,239,.66);line-height:1.6;margin:0 0 2rem;\">Étude préliminaire : marché, positionnement et faisabilité.<\u002Fp>\n\n    <nav style=\"display:flex;flex-direction:column;gap:.25rem;margin-bottom:auto;\">\n      <sc-for list=\"{{ tabs }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n          <span style=\"{{ item.numStyle }}\">{{ item.num }}<\u002Fspan>{{ item.label }}\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"border-top:1px solid rgba(250,247,239,.14);padding-top:1.2rem;margin-top:1.8rem;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:rgba(250,247,239,.48);line-height:1.9;\">\n      Par <b style=\"color:rgba(250,247,239,.85);font-weight:500;\">Rawdah Khoodoruth<\u002Fb> — Conseil étude + lancement<br>\n      Juillet 2026\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"flex:1;min-width:0;padding:4rem 3rem 6rem;max-width:920px;\">\n\n    <!-- 01 OPPORTUNITE -->\n    <sc-if value=\"{{ isP1 }}\" hint-placeholder-val=\"{{ true }}\">\n    <section data-screen-label=\"Opportunité\" style=\"animation:fadein .4s ease;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#AD8032;margin-bottom:1rem;\">01 — Le marché<\u002Fdiv>\n      <h2 style=\"font-family: 'Petrona',serif; font-weight: 400; font-size: clamp(1.7rem,3.6vw,2.5rem); line-height: 1.18; margin: 0 0 1.2rem; color: #17241D; letter-spacing: -.01em; text-align: center\">Un marché en pleine bascule démographique, encore mal servi sur le haut de gamme à la carte.<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin:2.4rem 0 2.8rem;\">\n        <div style=\"background:#FEFCF6;border:1px solid rgba(124,138,114,.22);border-radius:14px;padding:1.7rem 1.3rem;box-shadow:0 8px 22px rgba(23,36,29,.07);display:flex;flex-direction:column;align-items:center;text-align:center;gap:.7rem;\">\n          <svg width=\"104\" height=\"104\" viewBox=\"0 0 100 100\">\n            <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(124,138,114,.18)\" stroke-width=\"10\"><\u002Fcircle>\n            <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"#AD8032\" stroke-width=\"10\" stroke-linecap=\"round\" stroke-dasharray=\"251.33\" stroke-dashoffset=\"198.5\" transform=\"rotate(-90 50 50)\"><\u002Fcircle>\n            <text x=\"50\" y=\"57\" text-anchor=\"middle\" font-family=\"Petrona, serif\" font-weight=\"600\" font-size=\"21\" fill=\"#17241D\">21%<\u002Ftext>\n          <\u002Fsvg>\n          <div style=\"font-size:.84rem;color:#7C8A72;line-height:1.5;\">de la population française a 65 ans ou plus (INSEE, 2024) — en hausse continue depuis 2011.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FEFCF6;border:1px solid rgba(124,138,114,.22);border-radius:14px;padding:1.7rem 1.3rem;box-shadow:0 8px 22px rgba(23,36,29,.07);display:flex;flex-direction:column;align-items:center;text-align:center;gap:.7rem;\">\n          <div style=\"display:flex;align-items:flex-end;gap:.5rem;height:52px;\">\n            <div style=\"width:26px;height:28px;background:rgba(181,80,46,.28);border-radius:4px 4px 0 0;\"><\u002Fdiv>\n            <div style=\"width:26px;height:52px;background:#B5502E;border-radius:4px 4px 0 0;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Petrona',serif;font-weight:600;font-size:1.7rem;color:#17241D;\">+49%<\u002Fdiv>\n          <div style=\"font-size:.7rem;font-family:'IBM Plex Mono',monospace;color:#B5502E;letter-spacing:.05em;\">2021 → 2031<\u002Fdiv>\n          <div style=\"font-size:.84rem;color:#7C8A72;line-height:1.5;\">de croissance de la tranche 75–84 ans attendue (INSEE) — le pic de la vague arrive.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FEFCF6;border:1px solid rgba(124,138,114,.22);border-radius:14px;padding:1.7rem 1.3rem;box-shadow:0 8px 22px rgba(23,36,29,.07);display:flex;flex-direction:column;align-items:center;text-align:center;gap:.7rem;\">\n          <svg width=\"104\" height=\"104\" viewBox=\"0 0 100 100\">\n            <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(124,138,114,.18)\" stroke-width=\"10\"><\u002Fcircle>\n            <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"#3E7C5A\" stroke-width=\"10\" stroke-linecap=\"round\" stroke-dasharray=\"251.33\" stroke-dashoffset=\"37.7\" transform=\"rotate(-90 50 50)\"><\u002Fcircle>\n            <text x=\"50\" y=\"57\" text-anchor=\"middle\" font-family=\"Petrona, serif\" font-weight=\"600\" font-size=\"21\" fill=\"#17241D\">85%<\u002Ftext>\n          <\u002Fsvg>\n          <div style=\"font-size:.84rem;color:#7C8A72;line-height:1.5;\">des seniors français disent vouloir vieillir chez eux plutôt qu'en établissement.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"line-height: 1.72; font-size: 1.05rem; color: #3A4A3F; max-width: 64ch; text-align: justify\">Le marché de la silver économie pèse entre <b style=\"color:#17241D;\">60 Md€<\u002Fb> et <b style=\"color:#17241D;\">130 Md€<\u002Fb> en France selon la définition retenue. Ce grand écart montre surtout une chose : le secteur est fragmenté, et personne n'a encore structuré une offre de conciergerie à la carte pour le senior encore autonome.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2rem 0 2.6rem;\">\n        <div style=\"border:1px solid rgba(124,138,114,.22);border-top:3px solid #AD8032;border-radius:10px;padding:1.5rem 1.6rem;background:#FEFCF6;box-shadow:0 6px 18px rgba(23,36,29,.06);transition:box-shadow .25s ease,transform .25s ease;\" style-hover=\"box-shadow:0 14px 28px rgba(23,36,29,.12);transform:translateY(-2px);\"><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .6rem;color:#17241D;\">Le pouvoir d'achat est là<\u002Fh4><p style=\"font-size:.92rem;color:#4A5A4E;margin:0;line-height:1.6;\">Les plus de 50 ans ont le niveau de vie le plus élevé de France (INSEE) — la tranche d'âge la plus solvable pour des services premium.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid rgba(124,138,114,.22);border-top:3px solid #7C5CAD;border-radius:10px;padding:1.5rem 1.6rem;background:#FEFCF6;box-shadow:0 6px 18px rgba(23,36,29,.06);transition:box-shadow .25s ease,transform .25s ease;\" style-hover=\"box-shadow:0 14px 28px rgba(23,36,29,.12);transform:translateY(-2px);\"><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .6rem;color:#17241D;\">La peur de dépendre pousse à agir tôt<\u002Fh4><p style=\"font-size:.92rem;color:#4A5A4E;margin:0;line-height:1.6;\">64% des Français redoutent une situation de dépendance (OpinionWay) — un moteur d'achat qui démarre bien avant la perte d'autonomie réelle.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid rgba(124,138,114,.22);border-top:3px solid #3E7C5A;border-radius:10px;padding:1.5rem 1.6rem;background:#FEFCF6;box-shadow:0 6px 18px rgba(23,36,29,.06);transition:box-shadow .25s ease,transform .25s ease;\" style-hover=\"box-shadow:0 14px 28px rgba(23,36,29,.12);transform:translateY(-2px);\"><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .6rem;color:#17241D;\">Un vide entre deux offres<\u002Fh4><p style=\"font-size:.92rem;color:#4A5A4E;margin:0;line-height:1.6;\">D'un côté la téléassistance, pensée pour l'urgence médicale. De l'autre, les conciergeries à abonnement fixe. Rien entre les deux pour un besoin ponctuel, payé à l'acte.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid rgba(124,138,114,.22);border-top:3px solid #B5502E;border-radius:10px;padding:1.5rem 1.6rem;background:#FEFCF6;box-shadow:0 6px 18px rgba(23,36,29,.06);transition:box-shadow .25s ease,transform .25s ease;\" style-hover=\"box-shadow:0 14px 28px rgba(23,36,29,.12);transform:translateY(-2px);\"><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .6rem;color:#17241D;\">L'aide à domicile classique sature<\u002Fh4><p style=\"font-size:.92rem;color:#4A5A4E;margin:0;line-height:1.6;\">85% des structures d'aide à domicile peinent à recruter (Xerfi). La demande, déjà insatisfaite, se reporte ailleurs.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Notre cible : le senior seul, aisé, sans relais familial<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Pas \"tous les seniors\". Le cœur de cible est un profil précis, et c'est ce profil qui justifie le positionnement premium.<\u002Fp>\n\n      <div style=\"background:#EFE7D2;border-radius:8px;padding:1.5rem 1.7rem;margin:1.8rem 0;font-size:.96rem;color:#3A4A3F;line-height:1.65;\">Une personne âgée autonome/semi autonome, financièrement à l'aise, vivant seule , souvent sans enfant ou sans famille proche disponible pour organiser, vérifier, rassurer. Pour ce profil, la conciergerie ne vient pas en <i>complément<\u002Fi> d'un aidant familial : elle en tient lieu. C'est ce qui rend la relation de confiance construite avec ce senior plus centrale, et le prix premium plus justifiable, que pour un senior entouré par sa famille.<\u002Fdiv>\n\n      <div style=\"background:#17241D;border-radius:8px;padding:1.5rem 1.7rem;margin:1.8rem 0;font-size:.96rem;color:rgba(250,247,239,.85);line-height:1.65;box-shadow:0 16px 32px rgba(23,36,29,.18);\"><b style=\"color: rgb(212, 172, 110);\">Ce qu'il faut retenir :<\u002Fb> ce n'est pas un pari sur une tendance émergente , c'est un mur démographique déjà engagé, avec un segment (senior aisé, isolé, sans relais familial) qui n'a aujourd'hui peu d'offre adaptée en France.<\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- 02 OFFRE -->\n    <sc-if value=\"{{ isP0 }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Notre offre\" style=\"animation:fadein .4s ease;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#AD8032;margin-bottom:1rem;\">02 — Le concept<\u002Fdiv>\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:clamp(1.7rem,3.6vw,2.5rem);line-height:1.18;margin:0 0 1.2rem;color:#17241D;letter-spacing:-.01em;\">Un numéro. Une voix humaine. Un partenaire qui se déplace.<\u002Fh2>\n      <p style=\"font-size: 1.05rem; line-height: 1.65; color: #3A4A3F; max-width: 64ch; margin: 0 0 2rem; text-align: justify\">Le principe : le senior (ou un proche) compose un numéro unique de conciergerie privée. Un opérateur qualifie le besoin en direct et mobilise, depuis un réseau de partenaires contractualisés, celui qui peut intervenir. Pas d'application à télécharger pour commencer,&nbsp; pas d'abonnement obligatoire, on paie la prestation réalisée, à l'acte. Le catalogue va du quotidien (une course, un meuble à déplacer) au sur-mesure haut de gamme (organiser un séjour, trouver un chauffeur pour une occasion importante), toujours avec la même exigence de confiance.<\u002Fp>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Un accélérateur de lancement : le réseau Yes Conciergerie<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Là où un franchisé Yes Conciergerie est déjà implanté, une bonne partie du travail de terrain est déjà faite, c'est le vrai levier pour lancer vite et sans repartir de zéro.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2rem 0;\">\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Ce qui existe déjà sur place<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Une personne physique, pas juste un numéro<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Le franchisé local peut être le point de contact physique si une mission le demande (vérification, litige, situation délicate) , le senior sait qu'il y a quelqu'un joignable sur sa ville, pas seulement un centre d'appel distant.<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Un réseau de prestataires déjà qualifiés pour la conciergerie courte durée (ménage, petits travaux, gestion de clés)&nbsp; en grande partie transposable aux missions seniors.<\u002Fli>\n            <li>Une structure juridique et une implantation locale déjà en place, ce qui réduit le temps et le coût de recrutement de partenaires dans la zone.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Ce que ça change pour le lancement<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Un déploiement ville par ville<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Prioriser les villes où Yes Conciergerie a déjà un franchisé actif pour la première vague de lancement.<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Le franchisé peut être rémunéré pour ce rôle de relais local (temps de coordination, présence terrain)&nbsp; un revenu complémentaire pour lui, un coût de lancement réduit pour le projet.<\u002Fli>\n            <li>Là où il n'y a pas de franchisé, le recrutement de partenaires repart de zéro, ce sera plus lent et plus coûteux, un critère à intégrer dans le choix des zones pilotes.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2rem 0 2.6rem;\">\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">Manutention &amp; petits travaux<\u002Fh4><p style=\"{{ cardTextStyle }}\">Déplacer un meuble, changer une ampoule, installer un objet , des tâches ponctuelles trop petites pour un déménageur classique, trop physiques pour le senior seul.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">Courses &amp; commissions<\u002Fh4><p style=\"{{ cardTextStyle }}\">Aller chercher une ordonnance, faire les courses alimentaires, récupérer un colis ,la logistique du quotidien externalisée à la demande.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">Compagnie &amp; lien social<\u002Fh4><p style=\"{{ cardTextStyle }}\">Quelqu'un qui vient lire un livre, tenir compagnie, faire la conversation ,un besoin réel, aujourd'hui non structuré en offre payante à l'acte.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">Mobilité &amp; accompagnement<\u002Fh4><p style=\"{{ cardTextStyle }}\">Se rendre d'un point A à un point B, être accompagné pour faire les magasins ou un rendez-vous , au-delà du simple transport, une présence rassurante.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">Voyages &amp; escapades organisées<\u002Fh4><p style=\"{{ cardTextStyle }}\">Organiser un court séjour de A à Z, réservations, activités adaptées, coordination sur place. Le niveau de service d'une conciergerie d'hôtel, appliqué à la vie du senior.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">Chauffeur &amp; déplacements sur-mesure<\u002Fh4><p style=\"{{ cardTextStyle }}\">Trouver un chauffeur ponctuel ou régulier pour un rendez-vous important, un trajet longue distance, une sortie ,au-delà du simple accompagnement de proximité.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#EFE7D2;border-radius:8px;padding:1.5rem 1.7rem;margin:1.8rem 0;font-size:.96rem;color:#3A4A3F;line-height:1.65;\"><b style=\"color: rgb(23, 36, 29);\">Ce qui rend l'offre défendable :<\u002Fb> ce n'est pas la technologie (le paiement, le dispatch , c'est standard), c'est la <b style=\"color: rgb(23, 36, 29);\">qualité du réseau de partenaires contractualisés<\u002Fb> et la <b style=\"color: rgb(23, 36, 29);\">confiance installée par la voix humaine au téléphone<\u002Fb>. Deux choses qui prennent du temps à construire et qui, une fois en place, sont difficiles à copier vite.<\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Une exigence : le premium, à chaque étape<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Le positionnement n'est pas \"une plateforme de petits boulots\" mais une conciergerie au sens hôtelier du terme , sélective côté partenaires, personnalisée côté senior.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2rem 0;\">\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Côté partenaires<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Un réseau trié, pas une place de marché ouverte<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Entretien préalable et vérification d'identité avant toute contractualisation<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Extrait de casier judiciaire (bulletin n°3) systématique<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Références vérifiées et période d'essai encadrée avant intégration définitive au réseau<\u002Fli>\n            <li>Charte de service : ponctualité, tenue, discrétion, savoir-être avec un public senior<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Côté senior<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Une expérience personnalisée, pas anonyme<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Fiche senior conservée (préférences, historique, contact d'urgence) pour éviter de tout réexpliquer à chaque appel<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Même interlocuteur privilégié pour les seniors réguliers, dans l'esprit d'un conseiller dédié<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Appel de satisfaction après chaque mission sensible (compagnonnage, première intervention d'un partenaire)<\u002Fli>\n            <li>Aucun présupposé de famille disponible : le senior peut désigner lui-même une personne de confiance à tenir informée s'il le souhaite (ami, notaire, tuteur) — ou choisir de n'impliquer personne<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Petrona',serif;font-weight:500;font-style:italic;font-size:clamp(1.3rem,2.5vw,1.7rem);color:#17241D;line-height:1.45;max-width:38ch;margin:3rem 0 2.6rem;border-left:3px solid #AD8032;padding-left:1.5rem;\">« À l'ère où tout devient chatbot et répondeur automatique, on vend l'inverse : la certitude qu'une vraie personne décroche. »<\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:0 0 1rem;color:#17241D;\">Deux portes d'entrée, un seul réseau derrière<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Le téléphone reste le cœur du produit, c'est lui qui porte la promesse premium. Mais une application vient absorber les demandes simples et répétées, pour que le canal humain ne soit jamais saturé par ce qui pourrait se réserver seul.<\u002Fp>\n\n      <div style=\"background:#17241D;padding:3.2rem 1.5rem;display:flex;justify-content:center;align-items:flex-start;gap:2.6rem;flex-wrap:wrap;margin:2rem 0;border-radius:14px;\">\n        <div>\n          <div style=\"width:250px;background:#FAF7EF;border-radius:30px;border:6px solid #0d1712;box-shadow:0 30px 60px rgba(0,0,0,.5);overflow:hidden;\">\n            <div style=\"height:22px;background:#0d1712;position:relative;\"><\u002Fdiv>\n            <div style=\"background:#17241D;color:#FAF7EF;padding:1rem 1.1rem .9rem;\"><div style=\"color:#D4AC6E;font-size:.62rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin:0 0 .25rem;\">Application senior<\u002Fdiv><div style=\"font-family:'Petrona',serif;font-size:1.15rem;\">Bonjour Mme R.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:1rem .9rem 1.3rem;\">\n              <div style=\"{{ missionCardStyle }}\"><div style=\"font-size:.85rem;color:#17241D;font-weight:600;margin-bottom:.2rem;\">📞 Appeler ma conciergerie<\u002Fdiv><div style=\"font-size:.72rem;color:#7C8A72;margin-bottom:.7rem;\">Un conseiller décroche en direct<\u002Fdiv><div style=\"{{ missionBtnStyle }}\">Appeler maintenant<\u002Fdiv><\u002Fdiv>\n              <div style=\"{{ missionCardStyle }}\"><div style=\"font-size:.85rem;color:#17241D;font-weight:600;margin-bottom:.2rem;\">🔁 Réserver une mission habituelle<\u002Fdiv><div style=\"font-size:.72rem;color:#7C8A72;margin-bottom:.7rem;\">Courses du jeudi · même partenaire que d'habitude<\u002Fdiv><div style=\"{{ missionBtnGhostStyle }}\">Réserver sans appeler<\u002Fdiv><\u002Fdiv>\n              <div style=\"{{ missionCardStyle }}\"><div style=\"font-size:.85rem;color:#17241D;font-weight:600;margin-bottom:.2rem;\">🗂 Mes missions<\u002Fdiv><div style=\"font-size:.72rem;color:#7C8A72;margin-bottom:.7rem;\">3 missions ce mois-ci · dernière le 4 juillet<\u002Fdiv><div style=\"{{ missionBtnGhostStyle }}\">Voir l'historique<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;color:rgba(250,247,239,.5);font-size:.72rem;font-family:'IBM Plex Mono',monospace;margin-top:.9rem;width:250px;\">Maquette illustrative — application senior<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2rem 0 2.8rem;\">\n        <div style=\"{{ mpSideStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Le téléphone<\u002Fdiv><h4 style=\"font-family:'Petrona',serif;font-size:1.15rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Le canal premium, humain<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\"><li style=\"margin-bottom:.5rem;\">Toute première prise de contact avec un nouveau senior<\u002Fli><li style=\"margin-bottom:.5rem;\">Demandes sensibles, urgentes, ou qui sortent du cadre habituel<\u002Fli><li>Les seniors qui ne veulent tout simplement pas d'écran<\u002Fli><\u002Ful>\n        <\u002Fdiv>\n        <div style=\"{{ mpSideStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">L'application<\u002Fdiv><h4 style=\"font-family:'Petrona',serif;font-size:1.15rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Le canal qui absorbe le volume<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\"><li style=\"margin-bottom:.5rem;\">Missions récurrentes déjà connues (mêmes courses, même partenaire)<\u002Fli><li style=\"margin-bottom:.5rem;\">Utilisée aussi par une personne de confiance désignée par le senior, quand elle existe , sans jamais en faire une condition du service<\u002Fli><li>Réduit mécaniquement le nombre d'appels par senior actif à mesure que la base grandit , c'est la vraie réponse au problème de scale du centre d'appel (onglet suivant)<\u002Fli><\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Le moteur marketplace, en coulisse<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Le senior ne voit jamais de marketplace, il parle à une personne. Mais en coulisse, chaque appel ou réservation devient une <b style=\"color: rgb(23, 36, 29);\">mission<\u002Fb> publiée sur une plateforme interne à deux faces : la demande qualifiée par l'opérateur, l'offre portée par le réseau de partenaires.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2rem 0;\">\n        <div style=\"{{ mpSideStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Côté demande<\u002Fdiv><h4 style=\"font-family:'Petrona',serif;font-size:1.15rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Ce que poste l'opérateur<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\"><li style=\"margin-bottom:.5rem;\">Type de tâche, zone, créneau souhaité, budget indicatif<\u002Fli><li style=\"margin-bottom:.5rem;\">Niveau de priorité (immédiat, sous 24h, planifié)<\u002Fli><li>Préférences connues du senior (partenaire déjà rencontré, langue, etc.)<\u002Fli><\u002Ful>\n        <\u002Fdiv>\n        <div style=\"{{ mpSideStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Côté offre<\u002Fdiv><h4 style=\"font-family:'Petrona',serif;font-size:1.15rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Ce que voit le partenaire<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\"><li style=\"margin-bottom:.5rem;\">Missions disponibles dans sa zone et son domaine de compétence<\u002Fli><li style=\"margin-bottom:.5rem;\">Tarif proposé, distance, fenêtre horaire<\u002Fli><li>Un bouton \"Accepter\" — premier partenaire qualifié à répondre obtient la mission, avec priorité aux mieux notés<\u002Fli><\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#17241D;padding:3.2rem 1.5rem;display:flex;justify-content:center;align-items:flex-start;gap:2.6rem;flex-wrap:wrap;margin:2rem 0;border-radius:14px;\">\n        <div>\n          <div style=\"width:250px;background:#FAF7EF;border-radius:30px;border:6px solid #0d1712;box-shadow:0 30px 60px rgba(0,0,0,.5);overflow:hidden;\">\n            <div style=\"height:22px;background:#0d1712;\"><\u002Fdiv>\n            <div style=\"background:#17241D;color:#FAF7EF;padding:1rem 1.1rem .9rem;\"><div style=\"color:#D4AC6E;font-size:.62rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin:0 0 .25rem;\">Espace partenaire<\u002Fdiv><div style=\"font-family:'Petrona',serif;font-size:1.15rem;\">Missions disponibles<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:1rem .9rem 1.3rem;\">\n              <div style=\"{{ missionCardStyle }}\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;\"><span style=\"{{ tagStyle }}\">Manutention<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#17241D;font-size:.88rem;\">50 €<\u002Fspan><\u002Fdiv><div style=\"font-size:.85rem;color:#17241D;font-weight:600;margin-bottom:.2rem;\">Déplacer un meuble<\u002Fdiv><div style=\"font-size:.72rem;color:#7C8A72;margin-bottom:.7rem;\">Toulouse centre · 1,2 km · aujourd'hui 15h–16h<\u002Fdiv><div style=\"{{ missionBtnStyle }}\">Accepter la mission<\u002Fdiv><\u002Fdiv>\n              <div style=\"{{ missionCardStyle }}\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;\"><span style=\"{{ tagStyle }}\">Compagnie<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#17241D;font-size:.88rem;\">70 €<\u002Fspan><\u002Fdiv><div style=\"font-size:.85rem;color:#17241D;font-weight:600;margin-bottom:.2rem;\">Lecture à domicile · 1h<\u002Fdiv><div style=\"font-size:.72rem;color:#7C8A72;margin-bottom:.7rem;\">Toulouse Saint-Cyprien · 3 km · demain 10h<\u002Fdiv><div style=\"{{ missionBtnGhostStyle }}\">Voir le détail<\u002Fdiv><\u002Fdiv>\n              <div style=\"{{ missionCardStyle }}\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;\"><span style=\"{{ tagStyle }}\">Mobilité<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#17241D;font-size:.88rem;\">22 €<\u002Fspan><\u002Fdiv><div style=\"font-size:.85rem;color:#17241D;font-weight:600;margin-bottom:.2rem;\">Accompagnement · rendez-vous médical<\u002Fdiv><div style=\"font-size:.72rem;color:#7C8A72;margin-bottom:.7rem;\">Toulouse Rangueil · 4,5 km · aujourd'hui 17h<\u002Fdiv><div style=\"{{ missionBtnGhostStyle }}\">Voir le détail<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;color:rgba(250,247,239,.5);font-size:.72rem;font-family:'IBM Plex Mono',monospace;margin-top:.9rem;width:250px;\">Maquette illustrative — espace partenaire<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width:250px;background:#FAF7EF;border-radius:30px;border:6px solid #0d1712;box-shadow:0 30px 60px rgba(0,0,0,.5);overflow:hidden;\">\n            <div style=\"height:22px;background:#0d1712;\"><\u002Fdiv>\n            <div style=\"background:#17241D;color:#FAF7EF;padding:1rem 1.1rem .9rem;\"><div style=\"color:#D4AC6E;font-size:.62rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin:0 0 .25rem;\">Console opérateur<\u002Fdiv><div style=\"font-family:'Petrona',serif;font-size:1.15rem;\">Mission #A214<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:1rem .9rem 1.3rem;\">\n              <div style=\"{{ detailRowStyle }}\"><span>Senior<\u002Fspan><b style=\"color:#17241D;\">Mme R. — Toulouse<\u002Fb><\u002Fdiv>\n              <div style=\"{{ detailRowStyle }}\"><span>Demande<\u002Fspan><b style=\"color:#17241D;\">Déplacer un meuble<\u002Fb><\u002Fdiv>\n              <div style=\"{{ detailRowStyle }}\"><span>Créneau<\u002Fspan><b style=\"color:#17241D;\">Aujourd'hui, 15h–16h<\u002Fb><\u002Fdiv>\n              <div style=\"{{ detailRowStyle }}\"><span>Partenaire proposé<\u002Fspan><b style=\"color:#17241D;\">Julien M. — ★ 4,9<\u002Fb><\u002Fdiv>\n              <div style=\"{{ detailRowStyle }}\"><span>Prix mission<\u002Fspan><b style=\"color:#17241D;\">35 €<\u002Fb><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:.76rem;padding:.55rem 0;color:#4A5A4E;\"><span>Commission (22%)<\u002Fspan><b style=\"color:#17241D;\">7,70 €<\u002Fb><\u002Fdiv>\n              <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;background:#EFE7D2;color:#17241D;padding:.25rem .6rem;border-radius:10px;margin-top:.8rem;\">Statut · Confirmée, en attente d'intervention<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;color:rgba(250,247,239,.5);font-size:.72rem;font-family:'IBM Plex Mono',monospace;margin-top:.9rem;width:250px;\">Maquette illustrative — vue opérateur<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: #EFE7D2; border-radius: 8px; padding: 1.5rem 1.7rem; margin: 1.8rem 0; font-size: .96rem; color: #3A4A3F; line-height: 1.65; text-align: justify\"><b style=\"color: rgb(23, 36, 29);\">Pourquoi cette architecture compte :<\u002Fb> cette couche marketplace est ce qui rend le modèle scalable. Sans elle, chaque nouvelle mission suppose un appel manuel de l'opérateur à chaque partenaire un par un. Avec elle, le réseau de partenaires s'auto-organise sur les missions disponibles, l'opérateur reste focalisé sur la relation avec le senior, pas sur la logistique de recherche de disponibilité.<\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- 03 BENCHMARK -->\n    <sc-if value=\"{{ isP2 }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Benchmark\" style=\"animation:fadein .4s ease;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#AD8032;margin-bottom:1rem;\">03 — Paysage concurrentiel<\u002Fdiv>\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:clamp(1.7rem,3.6vw,2.5rem);line-height:1.18;margin:0 0 1.2rem;color:#17241D;letter-spacing:-.01em;\">Personne n'occupe exactement la case \"conciergerie à la carte, sans abonnement, pour seniors aisés.\"<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 2.2rem;\">Un premier passage sur les acteurs français positionnés conciergerie / services à la personne pour seniors. Liste non exhaustive , la cartographie complète des +15 acteurs identifiés fait partie de l'étude approfondie.<\u002Fp>\n\n      <div style=\"overflow-x:auto;margin:1rem 0 2.4rem;border-radius:10px;border:1px solid rgba(124,138,114,.25);\">\n        <sc-raw-table style=\"width:100%;border-collapse:collapse;min-width:760px;font-size:.88rem;\">\n          <sc-raw-thead><sc-raw-tr>\n            <sc-raw-th style=\"{{ thStyle }}\">Acteur<\u002Fsc-raw-th><sc-raw-th style=\"{{ thStyle }}\">Positionnement<\u002Fsc-raw-th><sc-raw-th style=\"{{ thStyle }}\">Modèle<\u002Fsc-raw-th><sc-raw-th style=\"{{ thStyle }}\">Prix indicatif<\u002Fsc-raw-th><sc-raw-th style=\"{{ thStyle }}\">Financement<\u002Fsc-raw-th>\n          <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Les Majordomes<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Conciergerie seniors premium, coordination APA/MDPH<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Abonnement mensuel par palier<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">240 € – 1 920 €/mois<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><span style=\"{{ tagStyle }}\">Indépendant<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">YesHome<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Maintien à domicile, sécurisation logement + coordination<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Abonnement + espace numérique aidants<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Non communiqué<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><span style=\"{{ tagStyle }}\">Startup<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Famille-Seniors-En-Ligne<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">\"Majordome\" au téléphone, ~50-60 prestataires réseau<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Mise en relation à l'appel<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Abonnement gratuit particuliers<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><span style=\"{{ tagStyle }}\">Indépendant<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Europ Assistance (Domveil)<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Téléassistance historique + dispatch prestataires<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Abonnement + boîtier/médaillon obligatoire<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Selon formule<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><span style=\"{{ tagStyle }}\">Grand groupe<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Smart Good Alliance<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Conciergerie solidaire, réseau de concierges dédiés<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Financé par reversement CA partenaires (Casino)<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Gratuit pour le senior<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><span style=\"{{ tagStyle }}\">Modèle solidaire<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Neosilver<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Lutte contre l'isolement, activités collectives<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Plateforme de réservation d'activités<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">—<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><span style=\"{{ tagStyle }}\">4 M€ levés (2023)<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Papyhappy<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Comparateur EHPAD / résidences services<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Gratuit, financé par emploi (papyhappy.jobs)<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Gratuit<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><span style=\"{{ tagStyle }}\">1,5 M€ levés (2019)<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n      <\u002Fdiv>\n\n      <div style=\"background:#FEFCF6;border:1px solid rgba(124,138,114,.22);border-radius:14px;padding:2rem 2.2rem 1.6rem;margin:2.2rem 0 2.6rem;box-shadow:0 8px 22px rgba(23,36,29,.06);\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:1.1rem;\">Carte de positionnement<\u002Fdiv>\n        <svg viewBox=\"0 0 480 340\" style=\"width:100%;max-width:520px;display:block;margin:0 auto;overflow:visible;\">\n          <line x1=\"60\" y1=\"20\" x2=\"60\" y2=\"300\" stroke=\"rgba(124,138,114,.4)\" stroke-width=\"1.5\"><\u002Fline>\n          <line x1=\"60\" y1=\"300\" x2=\"460\" y2=\"300\" stroke=\"rgba(124,138,114,.4)\" stroke-width=\"1.5\"><\u002Fline>\n          <text x=\"60\" y=\"14\" font-family=\"IBM Plex Mono, monospace\" font-size=\"10\" fill=\"#7C8A72\" text-anchor=\"middle\">Humain / personnalisé<\u002Ftext>\n          <text x=\"60\" y=\"318\" font-family=\"IBM Plex Mono, monospace\" font-size=\"10\" fill=\"#7C8A72\" text-anchor=\"middle\">Boîtier / anonyme<\u002Ftext>\n          <text x=\"465\" y=\"304\" font-family=\"IBM Plex Mono, monospace\" font-size=\"10\" fill=\"#7C8A72\" text-anchor=\"start\">Paiement à l'acte →<\u002Ftext>\n          <text x=\"55\" y=\"304\" font-family=\"IBM Plex Mono, monospace\" font-size=\"10\" fill=\"#7C8A72\" text-anchor=\"end\">← Abonnement<\u002Ftext>\n\n          <circle cx=\"120\" cy=\"230\" r=\"7\" fill=\"#7C5CAD\"><\u002Fcircle>\n          <text x=\"132\" y=\"234\" font-family=\"IBM Plex Sans, sans-serif\" font-size=\"11\" fill=\"#3A4A3F\">Europ Assistance<\u002Ftext>\n\n          <circle cx=\"150\" cy=\"130\" r=\"7\" fill=\"#3E7C5A\"><\u002Fcircle>\n          <text x=\"162\" y=\"134\" font-family=\"IBM Plex Sans, sans-serif\" font-size=\"11\" fill=\"#3A4A3F\">Les Majordomes<\u002Ftext>\n\n          <circle cx=\"175\" cy=\"150\" r=\"7\" fill=\"#B5502E\"><\u002Fcircle>\n          <text x=\"187\" y=\"154\" font-family=\"IBM Plex Sans, sans-serif\" font-size=\"11\" fill=\"#3A4A3F\">YesHome<\u002Ftext>\n\n          <circle cx=\"230\" cy=\"200\" r=\"7\" fill=\"#7C8A72\"><\u002Fcircle>\n          <text x=\"242\" y=\"204\" font-family=\"IBM Plex Sans, sans-serif\" font-size=\"11\" fill=\"#3A4A3F\">Famille-Seniors-En-Ligne<\u002Ftext>\n\n          <circle cx=\"400\" cy=\"60\" r=\"11\" fill=\"#AD8032\"><\u002Fcircle>\n          <text x=\"400\" y=\"42\" font-family=\"Petrona, serif\" font-weight=\"600\" font-size=\"13\" fill=\"#17241D\" text-anchor=\"middle\">Notre offre<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Notre offre, face au marché<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Sur cinq critères qui structurent réellement le choix d'un senior aisé et autonome, voici où se situent les offres existantes , et où se place le concept envisagé.<\u002Fp>\n\n      <div style=\"overflow-x:auto;margin:1rem 0 2.4rem;border-radius:10px;border:1px solid rgba(124,138,114,.25);\">\n        <sc-raw-table style=\"width:100%;border-collapse:collapse;min-width:760px;font-size:.88rem;\">\n          <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"{{ thStyle }}\">Critère<\u002Fsc-raw-th><sc-raw-th style=\"{{ thStyle }}\">Téléassistance (Europ Assistance…)<\u002Fsc-raw-th><sc-raw-th style=\"{{ thStyle }}\">Conciergerie abonnement (Les Majordomes, YesHome…)<\u002Fsc-raw-th><sc-raw-th style=\"{{ thStyle }}\">Notre offre<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Point d'entrée<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Boîtier / médaillon obligatoire<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">App ou espace numérique aidant<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><b style=\"color:#AD8032;\">Téléphone, humain, sans boîtier<\u002Fb><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Modèle tarifaire<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Abonnement fixe<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Abonnement mensuel par palier<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><b style=\"color:#AD8032;\">Paiement à l'acte, commission<\u002Fb><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Cible réelle<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Senior en perte d'autonomie<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Aidant familial, coordination administrative<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><b style=\"color:#AD8032;\">Senior encore autonome, aisé<\u002Fb><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Catalogue de tâches<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Urgence, ménage, bricolage basique<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Coordination APA/MDPH, démarches<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><b style=\"color:#AD8032;\">Manutention, courses, compagnonnage, mobilité<\u002Fb><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"{{ tdNameStyle }}\">Compagnonnage à l'acte<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Non structuré<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\">Non structuré<\u002Fsc-raw-td><sc-raw-td style=\"{{ tdStyle }}\"><b style=\"color:#AD8032;\">Oui — lecture, présence, sorties<\u002Fb><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #AD8032;border-radius:10px;padding:1.8rem 1.9rem;margin:2.2rem 0;background:#FEFCF6;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#AD8032;margin-bottom:.7rem;\">Ce qui manque sur le marché aujourd'hui<\u002Fdiv>\n        <p style=\"margin:0 0 .9rem;color:#3A4A3F;font-size:.96rem;line-height:1.65;\"><b style=\"color:#17241D;\">1. Un point d'entrée non médicalisé.<\u002Fb> Toute l'offre installée part de la fragilité (chute, urgence, dépendance). Rien ne s'adresse au senior encore actif qui veut simplement déléguer une corvée ponctuelle.<\u002Fp>\n        <p style=\"margin:0 0 .9rem;color:#3A4A3F;font-size:.96rem;line-height:1.65;\"><b style=\"color: rgb(23, 36, 29);\">2. Le paiement à l'acte.<\u002Fb> Le marché est verrouillé sur l'abonnement mensuel , un frein pour un senior qui n'a pas de besoin récurrent mais ponctuel et veut rester libre.<\u002Fp>\n        <p style=\"margin:0 0 .9rem;color:#3A4A3F;font-size:.96rem;line-height:1.65;\"><b style=\"color:#17241D;\">3. Le compagnonnage comme prestation à part entière.<\u002Fb> Personne ne facture \"quelqu'un qui vient faire la conversation ou lire un livre\" comme un service au même titre qu'une course ou un déménagement léger — alors que c'est un besoin exprimé et solvable.<\u002Fp>\n        <p style=\"margin:0;color:#3A4A3F;font-size:.96rem;line-height:1.65;\"><b style=\"color:#17241D;\">4. Un réseau de partenaires mono-plateforme, contractualisé et audité.<\u002Fb> La plupart des acteurs font de la mise en relation ponctuelle ; peu construisent un vrai réseau engagé contractuellement, condition de la confiance pour ce public.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- 04 FAISABILITE -->\n    <sc-if value=\"{{ isP3 }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Faisabilité\" style=\"animation:fadein .4s ease;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#AD8032;margin-bottom:1rem;\">04 — Mise en place &amp; technique<\u002Fdiv>\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:clamp(1.7rem,3.6vw,2.5rem);line-height:1.18;margin:0 0 1.2rem;color:#17241D;letter-spacing:-.01em;\">Le parcours, du coup de fil du senior au paiement du partenaire.<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 2.2rem;\">Ce que l'étude complète détaillera avec les process, les scripts d'appel et les SLA. Ci-dessous, la mécanique générale.<\u002Fp>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.3rem;margin:2.2rem 0 .5rem;background:#17241D;border-radius:14px;padding:1.6rem 1.4rem;box-shadow:0 10px 26px rgba(23,36,29,.16);\">\n        <sc-for list=\"{{ flowSteps }}\" as=\"step\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;gap:.5rem;\">\n            <sc-if value=\"{{ step.showArrow }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"color:#D4AC6E;font-size:1.1rem;opacity:.6;\">→<\u002Fdiv><\u002Fsc-if>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:.4rem;width:76px;\">\n              <div style=\"width:38px;height:38px;border-radius:50%;background:{{ step.bg }};color:{{ step.fg }};display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:.85rem;flex-shrink:0;\">{{ step.num }}<\u002Fdiv>\n              <div style=\"font-size:.66rem;color:rgba(250,247,239,.7);text-align:center;line-height:1.3;\">{{ step.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin:1rem 0 2rem;\">\n        <div style=\"display:grid;grid-template-columns:64px 1fr;gap:1.2rem;padding:1.3rem 0;border-top:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'IBM Plex Mono',monospace;color:#AD8032;font-size:.9rem;padding-top:.2rem;\">01<\u002Fdiv><div><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .4rem;color:#17241D;\">Appel entrant<\u002Fh4><p style=\"margin:0;font-size:.94rem;color:#4A5A4E;max-width:58ch;line-height:1.6;\">Le senior (ou un aidant) appelle un numéro unique. Un opérateur qualifie la demande : nature de la tâche, urgence, lieu, budget. <\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:64px 1fr;gap:1.2rem;padding:1.3rem 0;border-top:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'IBM Plex Mono',monospace;color:#AD8032;font-size:.9rem;padding-top:.2rem;\">02<\u002Fdiv><div><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .4rem;color:#17241D;\">Sélection du partenaire<\u002Fh4><p style=\"margin:0;font-size:.94rem;color:#4A5A4E;max-width:58ch;line-height:1.6;\">L'opérateur mobilise un prestataire déjà contractualisé dans le réseau. <b style=\"color:#17241D;\"><\u002Fb><\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:64px 1fr;gap:1.2rem;padding:1.3rem 0;border-top:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'IBM Plex Mono',monospace;color:#AD8032;font-size:.9rem;padding-top:.2rem;\">03<\u002Fdiv><div><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .4rem;color:#17241D;\">Réservation &amp; confirmation<\u002Fh4><p style=\"margin:0;font-size:.94rem;color:#4A5A4E;max-width:58ch;line-height:1.6;\">Le créneau est réservé, le senior reçoit une confirmation (appel ou SMS). Le partenaire est briefé sur la mission, y compris les préférences déjà connues du senior.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:64px 1fr;gap:1.2rem;padding:1.3rem 0;border-top:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'IBM Plex Mono',monospace;color:#AD8032;font-size:.9rem;padding-top:.2rem;\">04<\u002Fdiv><div><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .4rem;color:#17241D;\">Intervention<\u002Fh4><p style=\"margin:0;font-size:.94rem;color:#4A5A4E;max-width:58ch;line-height:1.6;\">Le partenaire réalise la prestation chez le senior, dans le cadre contractuel défini avec la plateforme et selon la charte de service.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:64px 1fr;gap:1.2rem;padding:1.3rem 0;border-top:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'IBM Plex Mono',monospace;color:#AD8032;font-size:.9rem;padding-top:.2rem;\">05<\u002Fdiv><div><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .4rem;color:#17241D;\">Paiement &amp; répartition<\u002Fh4><p style=\"margin:0;font-size:.94rem;color:#4A5A4E;max-width:58ch;line-height:1.6;\">Le senior règle via Stripe. La plateforme prélève sa commission, le solde est reversé automatiquement au partenaire via Stripe Connect.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:64px 1fr;gap:1.2rem;padding:1.3rem 0;border-top:1px solid rgba(124,138,114,.28);border-bottom:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'IBM Plex Mono',monospace;color:#AD8032;font-size:.9rem;padding-top:.2rem;\">06<\u002Fdiv><div><h4 style=\"font-family:'Petrona',serif;font-weight:500;font-size:1.1rem;margin:0 0 .4rem;color:#17241D;\">Suivi qualité<\u002Fh4><p style=\"margin:0;font-size:.94rem;color:#4A5A4E;max-width:58ch;line-height:1.6;\">Un appel de satisfaction ponctue les missions sensibles. La notation du partenaire alimente son score interne, condition de son maintien dans le réseau.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:2.2rem 0;\">\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Point de vigilance n°1<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Statut juridique SAP<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Mise en relation pure : responsabilité limitée, mais pas d'éligibilité au crédit d'impôt 50% pour le senior.<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Statut mandataire ou prestataire : ouvre le crédit d'impôt (argument commercial fort) mais engage la responsabilité juridique de la structure.<\u002Fli>\n            <li>À trancher avant le lancement, impacte le pricing et le discours commercial.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Point de vigilance n°2<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Le centre d'appel<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Coût caché principal du modèle : un humain qualifié pour qualifier chaque demande hétérogène.<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Nécessite un volume minimum pour amortir le coût par appel.<\u002Fli>\n            <li>Différenciant marketing fort auprès d'un public senior peu à l'aise avec les apps.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      \n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Tout en interne, sauf le seul maillon qui ne scale pas comme du code : les appels<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Choix assumé : construire l'application, le CRM, le back-office partenaires et le dashboard en interne, pour garder la main sur le produit. Le seul élément externalisé au départ est la téléphonie ,précisément parce que c'est le vrai goulot d'étranglement du modèle.<\u002Fp>\n\n      <div style=\"border:1px solid #AD8032;border-radius:10px;padding:1.8rem 1.9rem;margin:2.2rem 0;background:#FEFCF6;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#AD8032;margin-bottom:.7rem;\">Le vrai obstacle, à prendre au sérieux<\u002Fdiv>\n        <p style=\"margin:0;color:#3A4A3F;font-size:.96rem;line-height:1.65;\">Un CRM, une appli, un dashboard , ça se construit une fois et ça scale à coût quasi nul. <b style=\"color: rgb(23, 36, 29);\">Un appel, non.<\u002Fb> Chaque appel supplémentaire coûte du temps humain, quel que soit le nombre de seniors déjà sur la plateforme. C'est la vraie limite du modèle<\u002Fp>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.3rem;margin:2.4rem 0 1.2rem;color:#17241D;\">Trois réponses au problème de scale des appels<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:0 0 2.4rem;\">\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">1 — Basculer le volume récurrent vers l'app<\u002Fh4><p style=\"{{ cardTextStyle }}\">Une mission déjà connue (mêmes courses, même partenaire) se réserve depuis l'application sans appel. Mécaniquement, le ratio appels / senior actif baisse à mesure que la base de clients fidèles grandit , l'appel reste réservé à ce qui a vraiment besoin d'une voix humaine.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">2 — Externaliser la téléphonie à un partenaire élastique<\u002Fh4><p style=\"{{ cardTextStyle }}\">Un centre d'appel spécialisé (BPO) à capacité variable absorbe les pics sans qu'il faille embaucher et former en interne à chaque palier de croissance. On paie à l'appel ou à l'heure, pas un plateau fixe sous-utilisé les jours calmes.<\u002Fp><\u002Fdiv>\n        <div style=\"{{ cardStyle }}\"><h4 style=\"{{ cardTitleStyle }}\">3 — Pré-qualification assistée, pas remplacée<\u002Fh4><p style=\"{{ cardTextStyle }}\">Un premier tri identifie la nature de la demande avant de transférer à l'opérateur humain, ça raccourcit le temps d'appel sans jamais retirer l'humain de l'échange.&nbsp;<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#EFE7D2;border-radius:8px;padding:1.5rem 1.7rem;margin:1.8rem 0;font-size:.96rem;color:#3A4A3F;line-height:1.65;\"><b style=\"color: rgb(23, 36, 29);\">Le fil rouge :<\u002Fb> l'app n'est pas là pour remplacer l'appel ,elle est là pour que l'appel reste rare, donc précieux. C'est ce qui permet de tenir la promesse premium (\"une vraie personne décroche\") sans que le coût humain n'explose linéairement avec la croissance.<\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:1.5rem 0 2rem;\">\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Construit en interne<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">Le cœur du produit<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Application senior (réservation de missions connues, historique, contact du conseiller)<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">CRM / moteur de missions , chaque appel ou réservation app devient une \"mission\" tracée, avec fiche senior (préférences, historique, contact d'urgence)<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Back-office partenaires : zones, disponibilités, documents (assurance RC pro, casier B3), notation<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Dashboard de pilotage : délai de décroché, taux de résolution, satisfaction, revenu par zone<\u002Fli>\n            <li>Intégration native de Stripe Connect pour l'encaissement et le split automatique<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"{{ legalCardStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#7C8A72;margin-bottom:.5rem;\">Externalisé (au départ)<\u002Fdiv>\n          <h4 style=\"font-family:'Petrona',serif;font-size:1.2rem;font-weight:500;margin:0 0 .8rem;color:#17241D;\">La téléphonie<\u002Fh4>\n          <ul style=\"margin:0;padding-left:1.2rem;font-size:.9rem;color:#4A5A4E;line-height:1.7;\">\n            <li style=\"margin-bottom:.5rem;\">Ligne dédiée et centre d'appel via un partenaire spécialisé, capacité élastique selon le volume<\u002Fli>\n            <li style=\"margin-bottom:.5rem;\">Enregistrement des appels pour contrôle qualité et formation, réintégrable en interne une fois le volume stabilisé<\u002Fli>\n            <li>SMS de confirmation et rappel avant intervention, pour limiter les no-show sans appel supplémentaire<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#EFE7D2;border-radius:8px;padding:1.5rem 1.7rem;margin:1.8rem 0;font-size:.96rem;color:#3A4A3F;line-height:1.65;\"><b style=\"color:#17241D;\">Conformité :<\u002Fb> les données de personnes âgées sont une catégorie sensible — accès restreint, chiffrement, registre RGPD/CNIL dès le départ, que le composant soit interne ou externalisé. Pas d'hébergement de données de santé (HDS) tant qu'aucune donnée médicale n'est traitée.<\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- 05 ECONOMIE -->\n    <sc-if value=\"{{ isP4 }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Modèle économique\" style=\"animation:fadein .4s ease;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#AD8032;margin-bottom:1rem;\">05 — Chiffres<\u002Fdiv>\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:clamp(1.7rem,3.6vw,2.5rem);line-height:1.18;margin:0 0 1.8rem;color:#17241D;letter-spacing:-.01em;\">Une économie de commission, à valider sur un volume réel.<\u002Fh2>\n\n      <div style=\"background:#17241D;color:#FAF7EF;padding:1.7rem 1.8rem;margin:0 0 2.2rem;border-radius:10px;box-shadow:0 16px 32px rgba(23,36,29,.18);\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#D4AC6E;margin-bottom:.6rem;\">Hypothèses de travail<\u002Fdiv>\n        <p style=\"color:rgba(250,247,239,.8);font-size:.92rem;margin:0;line-height:1.65;\">Les chiffres ci-dessous sont illustratifs, construits à partir des ordres de grandeur observés chez Les Majordomes et les conciergeries premium comparables. Ils servent à démontrer la mécanique du modèle , c'est l'objet de l'étude complète de les affiner (volumes par zone, taux de conversion, saisonnalité).<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-raw-table style=\"width:100%;border-collapse:collapse;margin:0 0 1.6rem;font-size:.92rem;\">\n        <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"{{ econThStyle }}\">Poste<\u002Fsc-raw-th><sc-raw-th style=\"{{ econThStyle }}\">Hypothèse<\u002Fsc-raw-th><sc-raw-th style=\"{{ econThStyle }}\"><\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n        <sc-raw-tbody>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Panier moyen par mission<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTdStyle }}\">Mix de tâches courtes et de missions premium (voyages, chauffeur, forfaits)<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">150 €<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Commission plateforme<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTdStyle }}\">Prélevée via Stripe Connect<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">20–25%<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Revenu net / mission<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTdStyle }}\">Avant coût de qualification de l'appel<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">30 – 38 €<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Missions / senior actif / mois<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTdStyle }}\">Fréquence estimée sur clientèle fidélisée<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">3 – 5<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTotalTdStyle }}\">Revenu mensuel / 100 seniors actifs<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTotalTdStyle }}\">Base de calcul pour le scaling<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTotalNumStyle }}\">~ 9 000 – 19 000 €<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n        <\u002Fsc-raw-tbody>\n      <\u002Fsc-raw-table>\n\n      <p style=\"font-size:.92rem;color:#4A5A4E;line-height:1.65;\"><b style=\"color:#17241D;\">Pourquoi 150 € et pas 30-40 € comme du jobbing classique :<\u002Fb> le panier moyen mélange des tâches courtes (25 à 40 €, type course ou petit bricolage) et des missions premium (voyage organisé, chauffeur sur-mesure, compagnonnage récurrent, forfaits) qui tirent nettement la moyenne vers le haut. C'est cohérent avec un catalogue qui va du quotidien au sur-mesure haut de gamme, pas une place de marché de petits boulots.<\u002Fp>\n\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;\">Le vrai levier de rentabilité n'est pas le panier moyen mais la <b style=\"color: rgb(23, 36, 29);\">fréquence<\u002Fb> et le <b style=\"color: rgb(23, 36, 29);\">coût de qualification par appel<\u002Fb>&nbsp; c,'est ce que l'étude complète chiffrera précisément à partir de simulations de volume et d'un test terrain sur une zone pilote.<\u002Fp>\n\n      <div style=\"background:#EFE7D2;border-radius:8px;padding:1.5rem 1.7rem;margin:1.8rem 0;font-size:.96rem;color:#3A4A3F;line-height:1.65;\"><b style=\"color: rgb(23, 36, 29);\">Comparable marché :<\u002Fb> Les Majordomes facturent de 240 € à 1 920 €/mois en abonnement fixe , preuve que la disposition à payer existe déjà sur ce segment pour un service de coordination. Un modèle à la commission, plus flexible, peut capter une partie de cette demande sans exiger l'engagement mensuel.<\u002Fdiv>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Une zone pilote concrète : le 7e arrondissement de Paris<\u002Fh2>\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;max-width:62ch;margin:0 0 1.8rem;\">Le choix des villes ne sera pas aléatoire : on cible les zones qui cumulent une forte densité de seniors aisés et isolés&nbsp; et, idéalement, une ville déjà couverte par un franchisé Yes Conciergerie à fort potentiel. Le 7e arrondissement de Paris coche déjà ces cases : un exemple pour ancrer le calcul, pas une décision figée.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid rgba(124,138,114,.28);border-bottom:1px solid rgba(124,138,114,.28);margin:2rem 0 2.6rem;\">\n        <div style=\"padding:1.6rem 1.6rem 1.6rem 0;border-right:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'Petrona',serif;font-weight:600;font-size:clamp(1.8rem,3.4vw,2.4rem);color:#17241D;\">29,5%<\u002Fdiv><div style=\"font-size:.84rem;color:#7C8A72;line-height:1.5;margin-top:.5rem;\">de la population du 7e a 60 ans ou plus , la part la plus élevée de Paris avec le 6e (INSEE/Apur).<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:1.6rem 1.6rem;border-right:1px solid rgba(124,138,114,.28);\"><div style=\"font-family:'Petrona',serif;font-weight:600;font-size:clamp(1.8rem,3.4vw,2.4rem);color:#17241D;\">43 300 €<\u002Fdiv><div style=\"font-size:.84rem;color:#7C8A72;line-height:1.5;margin-top:.5rem;\">revenu médian annuel par ménage dans le 7e , le plus élevé de la capitale (contre 27 400 € en moyenne parisienne).<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:1.6rem 0 1.6rem 1.6rem;\"><div style=\"font-family:'Petrona',serif;font-weight:600;font-size:clamp(1.8rem,3.4vw,2.4rem);color:#17241D;\">~51 400<\u002Fdiv><div style=\"font-size:.84rem;color:#7C8A72;line-height:1.5;margin-top:.5rem;\">habitants au total dans l'arrondissement, soit environ 15 000 personnes de 60 ans ou plus.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-raw-table style=\"width:100%;border-collapse:collapse;margin:0 0 1.6rem;font-size:.92rem;\">\n        <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"{{ econThStyle }}\">Étape du calcul<\u002Fsc-raw-th><sc-raw-th style=\"{{ econThStyle }}\">Hypothèse (volontairement prudente)<\u002Fsc-raw-th><sc-raw-th style=\"{{ econThStyle }}\"><\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n        <sc-raw-tbody>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Seniors de 60 ans ou plus dans le 7e<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTdStyle }}\">29,5% de ~51 400 habitants<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">~15 000<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Part réaliste autonome &amp; cible (hors GIR dépendant)<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTdStyle }}\">Estimation conservatrice, à affiner en étude<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">~9 000<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTdStyle }}\">Taux de pénétration année 1<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTdStyle }}\">Objectif prudent pour un lancement local, pas un scénario optimiste<\u002Fsc-raw-td><sc-raw-td style=\"{{ econNumStyle }}\">1,5 – 2%<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"{{ econTotalTdStyle }}\">Seniors actifs estimés, année 1<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTotalTdStyle }}\">Base réaliste pour piloter<\u002Fsc-raw-td><sc-raw-td style=\"{{ econTotalNumStyle }}\">135 – 180<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n        <\u002Fsc-raw-tbody>\n      <\u002Fsc-raw-table>\n\n      \n\n      <p style=\"font-size:1.05rem;line-height:1.65;color:#3A4A3F;\">Avec cette base et l'hypothèse de revenu déjà posée plus haut (~9 000 à 19 000 € de revenu net pour 100 seniors actifs), un lancement réussi dans le seul 7e arrondissement générerait de l'ordre de <b style=\"color: rgb(23, 36, 29);\">12 000 à 34 000 € de revenu net mensuel<\u002Fb> en fin de première année — un chiffre conservateur, qui sert de point de départ avant réplication sur d'autres arrondissements ou villes à profil comparable (6e, 16e, Neuilly-sur-Seine).<\u002Fp>\n\n      <h2 style=\"font-family:'Petrona',serif;font-weight:400;font-size:1.5rem;margin:3rem 0 1rem;color:#17241D;\">Les leviers p
